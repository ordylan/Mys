    <script>
        (function() {
            const DB_NAME = 'MyWords';
            const WORD_STORE = 'wordResources';
            const FAVOURITE_STORE = 'Favourite';
            const PROGRESS_STORE = 'Progress';
            const VERSION = 1;

            function openDB() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(DB_NAME, VERSION);
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (db.objectStoreNames.contains(WORD_STORE)) db.deleteObjectStore(
                            WORD_STORE);
                        if (db.objectStoreNames.contains(FAVOURITE_STORE)) db.deleteObjectStore(
                            FAVOURITE_STORE);
                        if (db.objectStoreNames.contains(PROGRESS_STORE)) db.deleteObjectStore(
                            PROGRESS_STORE);
                        db.createObjectStore(WORD_STORE, { keyPath: 'word' });
                        const favStore = db.createObjectStore(FAVOURITE_STORE, { keyPath: 'word' });
                        favStore.createIndex('isFavourite', 'isFavourite', { unique: false });
                        db.createObjectStore(PROGRESS_STORE, { keyPath: 'key' });
                    };
                    req.onsuccess = (e) => resolve(e.target.result);
                    req.onerror = (e) => reject(e.target.error);
                });
            }

            async function importWordsBank(estimatedSizeMB = 15) {
                const url = 'WordsBank.json';
                const progressBar = document.getElementById('progressBar');
                const progressText = document.getElementById('progressText');
                if (!progressBar) return;
                progressBar.style.display = 'block';
                progressBar.style.width = '0%';
                if (progressText) progressText.textContent = '准备下载...';
                const estimatedBytes = estimatedSizeMB * 1024 * 1024;
                let response;
                try {
                    response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                } catch (e) {
                    console.error('下载失败', e);
                    if (progressText) progressText.textContent = '下载失败';
                    return;
                }
                const reader = response.body.getReader();
                const chunks = [];
                let loaded = 0;
                try {
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        chunks.push(value);
                        loaded += value.length;
                        const pct = Math.min(80, Math.round((loaded / estimatedBytes) * 80));
                        progressBar.style.width = pct + '%';
                        if (progressText) progressText.textContent =
                            `词库已下载 ${(loaded / 1048576).toFixed(1)} MB / 约 ${estimatedSizeMB} MB`;
                    }
                } catch (streamErr) {
                    response = await fetch(url);
                    const blob = await response.blob();
                    const arrayBuffer = await blob.arrayBuffer();
                    chunks.push(new Uint8Array(arrayBuffer));
                    loaded = arrayBuffer.byteLength;
                    progressBar.style.width = '80%';
                    if (progressText) progressText.textContent = '下载完成, 正在导入...';
                }
                if (chunks.length === 0) {
                    if (progressText) progressText.textContent = '下载内容为空';
                    return;
                }
                const allBytes = new Uint8Array(loaded);
                let pos = 0;
                for (const chunk of chunks) {
                    allBytes.set(chunk, pos);
                    pos += chunk.length;
                }
                let data;
                try {
                    data = JSON.parse(new TextDecoder().decode(allBytes));
                } catch (e) {
                    console.error('JSON 解析失败', e);
                    if (progressText) progressText.textContent = '数据解析失败';
                    return;
                }
                const wordList = data.wordResources;
                if (!wordList || !Array.isArray(wordList)) {
                    console.error('数据格式错误');
                    return;
                }
                progressBar.style.width = '80%';
                if (progressText) progressText.textContent = '导入文本词库中...';
                await importToDB(wordList);
                progressBar.style.width = '100%';
                if (progressText) progressText.textContent = '文本词库下载完成';
                setTimeout(() => { progressBar.style.display = 'none';progressBar.style.display = 'none'; }, 1200);
                async function importToDB(words) {
                    const db = await openDB();
                    const tx = db.transaction('wordResources', 'readwrite');
                    const store = tx.objectStore('wordResources');
                    for (let i = 0; i < words.length; i++) {
                        await new Promise((res, rej) => {
                            const req = store.put(words[i]);
                            req.onsuccess = res;
                            req.onerror = rej;
                        });
                        const importPct = 80 + Math.round((i / words.length) * 20);
                        progressBar.style.width = importPct + '%';
                        if (progressText) progressText.textContent = `正在导入文本词库 ${i+1}/${words.length}`;
                        localStorage.ON_MyWords_Bank = "1";
                    }
                    await new Promise(res => { tx.oncomplete = res; });
                }
            }
function updateProgress(percent) {
    document.getElementById('progressBar').style.display='block';
document.getElementById('progressBar').style.width = percent + '%';
}
function getWordResource(db, word) {
    //太模糊了  极易出错  但总比没有好
  return new Promise(async (resolve, reject) => {
    const tx = db.transaction(WORD_STORE, 'readonly');
    const store = tx.objectStore(WORD_STORE);

    const tryWord = async (w) => {
      for (let len = w.length; len > 0; len--) {
        const key = w.substring(0, len);
        const result = await new Promise((res) => {
          const req = store.get(key);
          req.onsuccess = () => res(req.result);
          req.onerror = () => res(undefined);
        });
        if (result !== undefined) return result;
      }
      return null;
    };

    for (let drop = 0; drop <= 3; drop++) {
      if (drop >= word.length) break;
      const subWord = word.substring(drop);
      const found = await tryWord(subWord);
      if (found !== null) {
        resolve(found);
        return;
      }
    }

    resolve(null);
  });
}
            function getFavourite(db, word) {
                return new Promise((res, rej) => {
                    const tx = db.transaction(FAVOURITE_STORE, 'readonly');
                    const r = tx.objectStore(FAVOURITE_STORE).get(word);
                    r.onsuccess = () => res(r.result);
                    r.onerror = rej;
                });
            }

            function saveFavourite(db, data) {
                return new Promise((res, rej) => {
                    const tx = db.transaction(FAVOURITE_STORE, 'readwrite');
                    const r = tx.objectStore(FAVOURITE_STORE).put(data);
                    r.onsuccess = res;
                    r.onerror = rej;
                });
            }

            function getAllFavourites(db) {
                return new Promise((res, rej) => {
                    const tx = db.transaction(FAVOURITE_STORE, 'readonly');
                    const r = tx.objectStore(FAVOURITE_STORE).getAll();
                    r.onsuccess = () => res(r.result);
                    r.onerror = rej;
                });
            }

            function getProgress(db, key) {
                return new Promise((res, rej) => {
                    const tx = db.transaction(PROGRESS_STORE, 'readonly');
                    const r = tx.objectStore(PROGRESS_STORE).get(key);
                    r.onsuccess = () => res(r.result?.index || 0);
                    r.onerror = rej;
                });
            }

            function saveProgress(db, key, index) {
                if (!key) return Promise.resolve();  
                return new Promise((res, rej) => {
                    const tx = db.transaction(PROGRESS_STORE, 'readwrite');
                    const r = tx.objectStore(PROGRESS_STORE).put({ key, index });
                    r.onsuccess = res;
                    r.onerror = rej;
                });
            }

async function loadZipForWord(word) {
    try {
        const resp = await fetch(`Words/${word}.zip`);
        if (!resp.ok) return null;
        const zipData = await resp.arrayBuffer();
        return await JSZip.loadAsync(zipData);
    } catch (err) {
        console.warn('加载单词资源包失败:', word, err);
        return null;
    }
}
            async function extractResourceFromWordZip(word, path) {
                if (!path) return null;
                const zip = await loadZipForWord(word);
                if (!zip) return null;
                const file = zip.file(path);
                if (!file) return null;
                const blob = await file.async('blob');
                return blob.type ? blob : new Blob([blob], { type: 'audio/mpeg' });
            }

            async function loadImageFromZip(word, path) {
                if (!path) return null;
                try {
                    const zip = await loadZipForWord(word);
                    if (!zip) return null;
                    const file = zip.file(path);
                    if (!file) return null;
                    const blob = await file.async('blob');
                    return blob.type ? blob : new Blob([blob], { type: 'image/jpeg' });
                } catch (e) {
                    console.warn('加载图片失败:', word, e);
                    return null;
                }
            }
            function useTTS(word) {
                if ('speechSynthesis' in window) {
                    const u = new SpeechSynthesisUtterance(word);
                    u.lang = 'en-US';
                    speechSynthesis.speak(u);
                }
            }

            async function playWordAudio(word) {
                if (!audioEnabled) return;
                const db = await openDB();
                const wd = await getWordResource(db, word);
                if (wd?.audioUs) {
                    const blob = await extractResourceFromWordZip(word, wd.audioUs);
                    if (blob) {
                        const a = new Audio(URL.createObjectURL(blob));
                        a.play().catch(() => useTTS(word));
                        return;
                    }
                }
                useTTS(word);
            }

            function playSentenceAudio(sentence) {
                if (!audioEnabled || !currentWordList[currentIndex]) return;
                const word = currentWordList[currentIndex];
                if (sentence?.audio) {
                    extractResourceFromWordZip(word, sentence.audio).then(blob => {
                        if (blob) {
                            const a = new Audio(URL.createObjectURL(blob));
                            a.play().catch(() => useTTS(sentence.sentenceEn));
                        }
                    });
                } else if (sentence?.sentenceEn) useTTS(sentence.sentenceEn);
            }

            function playResultSound(isCorrect) {
                try {
                    const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    if (isCorrect) {
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                        osc.start(audioCtx.currentTime);
                        osc.stop(audioCtx.currentTime + 0.15);
                    } else {
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                        osc.start(audioCtx.currentTime);
                        osc.stop(audioCtx.currentTime + 0.2);
                    }
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                   // document.getElementById('playAudioBtn').click();
                } catch (e) {}
            }

            async function loadTextbookWordsFromFile(name) {
                const resp = await fetch(`Books/${name}.txt`);
                if (!resp.ok) throw new Error('加载失败');
                return (await resp.text()).split(',').map(w => w.trim()).filter(w => w);
            }

            // 打乱数组
            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

async function buildReviewList(count, filter, sort) {
    const db = await openDB();
    let records = (await getAllFavourites(db)).filter(r => r.word && r.answerCount > 0);
    if (filter !== '__all__') {
        const words = await loadTextbookWordsFromFile(filter);
        const set = new Set(words.map(w => w.toLowerCase()));
        records = records.filter(r => set.has(r.word.toLowerCase()));
    }
    if (!records.length) return [];

    switch (sort) {
        case 'earliest': 
            records.sort((a, b) => (b.lastLearnTime || '').localeCompare(a.lastLearnTime || ''));
            break;
        case 'oldest':  
            records.sort((a, b) => (a.lastLearnTime || '').localeCompare(b.lastLearnTime || ''));
            break;
        case 'mostErrors':
            records.sort((a, b) => {
                const rateA = a.answerCount > 0 ? (a.errorCount || 0) / a.answerCount : 0;
                const rateB = b.answerCount > 0 ? (b.errorCount || 0) / b.answerCount : 0;
                return rateB - rateA;
            });
            break;
        case 'randFav':
            records = records.filter(r => r.isFavourite);
            records = shuffleArray(records);
            break;
        case 'random':
        default:
            records = shuffleArray(records);
            break;
    }    if (sort === 'earliest' || sort === 'oldest' || sort === 'mostErrors') {
        records = shuffleArray(records.slice(0, count));
        return records.map(r => r.word);
    }
    return records.slice(0, count).map(r => r.word);
}

        dictationNeedsAdvance = false;
    }
                dictationSubmitted = true;
                historyList.push({ word, isCorrect, userInput: input, wordData: currentWordData });
                historyViewIndex = historyList.length - 1;
                showHistoryResult(historyViewIndex);
            }

            function showHistoryResult(index) {
                if (index < 0 || index >= historyList.length) return;
                const item = historyList[index];
                const isCorrect = item.isCorrect;
                document.getElementById('resultTitle').textContent = isCorrect ? '正确! ' : '错误! ';
                document.getElementById('resultTitle').className = 'result-title ' + (isCorrect ? 'result-correct' :
                    'result-wrong');
                let detailsHTML = '';
                if (currentMode === 'dictation' && item.userInput !== null) {
                    detailsHTML +=
                        `<p><strong>你的输入: </strong>${item.userInput} ${isCorrect?'√':'×'}</p><p><strong>正确答案: </strong>${item.word}</p>`;
                }
                detailsHTML += buildWordDetailsHTML(item.wordData);
                document.getElementById('wordDetailsBox').innerHTML = detailsHTML;
                bindDetailButtons(document.getElementById('wordDetailsBox'));
                document.getElementById('resultArea').style.display = 'block';
                document.getElementById('optionsArea').style.display = 'none';
                updateHistoryNavButtons();
                document.getElementById('wordDisplayBox').style.display = 'none';
                playResultSound(isCorrect);//有点奇怪 先不修复
                playWordAudio(item.word)
            }

            function updateHistoryNavButtons() {
                const prevBtn = document.getElementById('prevHistoryBtn');
                const nextBtn = document.getElementById('nextHistoryBtn');
                prevBtn.disabled = historyViewIndex <= 0;
                nextBtn.disabled = historyViewIndex >= historyList.length - 1;
            }

 async function goNextWord() {
    if (isTransitioning) return; 
    isTransitioning = true;
    try {
        if (currentMode === 'dictation' && !dictationSubmitted) {
            const inp = document.getElementById('dictationInput').value.trim();
            if (inp) {
                await handleDictationSubmit();
                return;
            }
        }
        if (currentMode === 'review') {
            if (reviewShouldAdvance) currentIndex++;
            reviewShouldAdvance = true;
        } else if (currentMode === 'dictation') {
            if (dictationNeedsAdvance) currentIndex++;
            dictationNeedsAdvance = true;
        } else {
            currentIndex++;
        }
        await saveProgress(await openDB(), getProgressKey(), currentIndex);
        await displayCurrentWord();
    } finally {
        isTransitioning = false;
    }
}
            function switchView(view) {
                document.getElementById('currentModeLabel').innerHTML = "MyWords";
                updateProgress(0);
                currentView = view;
                document.getElementById('homeView').style.display = view === 'home' ? 'block' : 'none';
                document.getElementById('studyView').style.display = view === 'study' ? 'block' : 'none';
                if (view === 'home') {
                    document.getElementById('backHomeBtn').style.display = 'none';
                    renderErrorBook();
                    updateModeButtons();
                }
                if (view === 'study') {
                    document.getElementById('backHomeBtn').style.display = '';
                    document.getElementById('currentModeLabel').textContent = currentMode === 'learn' ? '学习模式' :
                        currentMode === 'review' ? '复习模式' : '默写模式';
                }
            }

            function updateModeButtons() {
                document.getElementById('modeLearnBtn').classList.toggle('active-mode', currentMode === 'learn');
                document.getElementById('modeReviewBtn').classList.toggle('active-mode', currentMode === 'review');
                document.getElementById('modeDictationBtn').classList.toggle('active-mode', currentMode === 'dictation');
                document.getElementById('reviewSettingsPanel').style.display = currentMode === 'review' ? '' : 'none';
                document.getElementById('dictationSettingsPanel').style.display = currentMode === 'dictation' ? '' :
                'none';
            }

            async function startMode(mode) {
document.getElementById('completionOverlay').style.display = 'none';
document.getElementById('currentWordSpan').style.display = '';
document.getElementById('playAudioBtn').style.display = '';
document.getElementById('favouriteBtn').style.display = '';
document.getElementById('wordAccent').style.display = '';
document.getElementById('wordImageContainer').style.display = '';
document.getElementById('exampleSentenceBox').style.display = '';
document.getElementById('optionsArea').style.display = 'block';
document.getElementById('resultArea').style.display = 'none';
                const db = await openDB();
                // 重置所有进度和历史
                historyList = [];
                historyViewIndex = -1;
                dictationSubmitted = false;
                currentWordList = [];
                currentIndex = 0;
                currentWordData = null;
                reviewShouldAdvance = true;
                dictationNeedsAdvance = true;
                if (mode === 'learn') {
                    if (!currentTextbookName) {
                        document.getElementById('statusMsg').innerHTML =
                            '<span style="color:orange;">请先加载课本</span>';
                        return;
                    }
                    currentWordList = await loadTextbookWordsFromFile(currentTextbookName);
                    const idx = await getProgress(db, `learn_${currentTextbookName}`);
                    currentIndex = Math.min(idx, currentWordList.length - 1);
                } else if (mode === 'review') {
                    const count = parseInt(document.getElementById('reviewCountInput').value) || 20;
                    reviewTextbookFilter = document.getElementById('reviewTextbookSelect').value;
                    reviewSortMode = document.getElementById('reviewSortSelect').value;
                    currentWordList = await buildReviewList(count, reviewTextbookFilter, reviewSortMode);
                    if (!currentWordList.length) {
                        document.getElementById('reviewEmptyMsg').style.display = 'block';
                        switchView('study');
                        return;
                    }
                    currentIndex = 0;
                   // await saveProgress(db, getProgressKey(), 0);
                } else if (mode === 'dictation') {
                    const count = parseInt(document.getElementById('dictationCountInput').value) || 20;
                    dictationTextbookFilter = document.getElementById('dictationTextbookSelect').value;
                    dictationSortMode = document.getElementById('dictationSortSelect').value;
                    currentWordList = await buildDictationList(count, dictationTextbookFilter, dictationSortMode);
                    if (!currentWordList.length) {
                        document.getElementById('reviewEmptyMsg').style.display = 'block';
                        switchView('study');
                        return;
                    }
                    currentIndex = 0;
                   // await saveProgress(db, getProgressKey(), 0);
                }
                currentMode = mode;
                document.getElementById('reviewEmptyMsg').style.display = 'none';
                switchView('study');
                await displayCurrentWord();
            }

            async function renderErrorBook() {
                const db = await openDB();
                const all = await getAllFavourites(db);
                const favWords = all.filter(r => r.isFavourite && r.word);
                const listEl = document.getElementById('errorBookList');
                if (!favWords.length) {
                    listEl.innerHTML = '<p style="color:#888;">None</p>';
                    return;
                }
                const wordDataMap = {};
                await Promise.all(favWords.map(async f => {
                    const wd = await getWordResource(db, f.word);
                    if (wd) wordDataMap[f.word] = wd;
                }));
                listEl.innerHTML = favWords.map(f => {
                    const wd = wordDataMap[f.word];
                    const meanings = wd?.cnMean || [];
                    const meaningItems = meanings.map(m =>
                        `<span class="fav-chinese-item" title="${m.mean}">${m.mean}</span>`).join('');
                    return `
                        <div class="fav-word-container" data-word="${f.word}">
                            <div class="fav-word-row">
                                <span class="fav-word-text">${f.word}</span>
                                <div class="fav-chinese-area">
                                    <div class="fav-chinese-grid">${meaningItems || '<span style="color:#aaa;">无释义</span>'}</div>
                                </div>
                                <button class="fav-remove-btn" data-word="${f.word}">✕</button>
                            </div>
                            <div class="fav-word-detail"></div>
                        </div>
                    `;
                }).join('');

                document.querySelectorAll('.fav-word-container').forEach(container => {
                    const word = container.dataset.word;
                    const wordText = container.querySelector('.fav-word-text');
                    const chineseArea = container.querySelector('.fav-chinese-area');
                    const chineseGrid = container.querySelector('.fav-chinese-grid');
                    const removeBtn = container.querySelector('.fav-remove-btn');
                    const detailDiv = container.querySelector('.fav-word-detail');

                    wordText.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        if (detailDiv.classList.contains('show')) {
                            detailDiv.classList.remove('show');
                        } else {
                            if (!detailDiv.innerHTML) {
                                const wd = wordDataMap[word] || await getWordResource(await openDB(),
                                    word);
                                detailDiv.innerHTML = wd ? buildWordDetailsHTML(wd) : '<p>无详情</p>';
                                if (wd) bindDetailButtons(detailDiv);
                            }
                            detailDiv.classList.add('show');
                        }
                    });

                    chineseArea.addEventListener('click', (e) => {
                        e.stopPropagation();
                        chineseGrid.classList.toggle('show');
                    });

                    removeBtn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        if (confirm(`确定要取消收藏 "${word}" 吗？`)) {
                            const db = await openDB();
                            let fav = await getFavourite(db, word);
                            if (fav) { fav.isFavourite = false;
                                await saveFavourite(db, fav); }
                            renderErrorBook();
                        }
                    });
                });
            }

            function updateFavouriteButton() {
                const btn = document.getElementById('favouriteBtn');
                if (currentIsFavourite) {
                    btn.textContent = '已收藏';
                    btn.className = 'fav-btn faved';
                } else {
                    btn.textContent = '收藏';
                    btn.className = 'fav-btn';
                }
            }
            async function toggleFavourite() {
                const word = currentWordList[currentIndex];
                if (!word) return;
                const db = await openDB();
                currentIsFavourite = !currentIsFavourite;
                updateFavouriteButton();
                let favData = await getFavourite(db, word);
                if (!favData) {
                    favData = {
                        word,
                        isFavourite: currentIsFavourite,
                        answerCount: 0,
                        errorCount: 0,
                        dictationCount: 0,
                        dictationErrorCount: 0,
                        lastLearnTime: null,
                        lastReviewTime: null,
                        lastDictationTime: null
                    };
                } else {
                    favData.isFavourite = currentIsFavourite;
                }
                await saveFavourite(db, favData);
    const detailFavBtn = document.querySelector('#wordDetailsBox .fav-btn-inline');
    if (detailFavBtn) {
        detailFavBtn.textContent = currentIsFavourite ? '已收藏' : '收藏';
        detailFavBtn.classList.toggle('faved', currentIsFavourite);
    }

            }

            function loadSettings() {
                audioEnabled = localStorage.getItem('mywords_audio') !== 'false';
                document.getElementById('enableAudio').checked = audioEnabled;
                document.getElementById('settingAudio').checked = audioEnabled;
                const revCount = localStorage.getItem('mywords_reviewCount') || 20;
                document.getElementById('settingReviewCount').value = revCount;
                document.getElementById('reviewCountInput').value = revCount;
                const dictCount = localStorage.getItem('mywords_dictationCount') || 20;
                document.getElementById('settingDictationCount').value = dictCount;
                document.getElementById('dictationCountInput').value = dictCount;
            }

            function saveSettings() {
                audioEnabled = document.getElementById('settingAudio').checked;
                localStorage.setItem('mywords_audio', audioEnabled);
                document.getElementById('enableAudio').checked = audioEnabled;
                const revVal = document.getElementById('settingReviewCount').value;
                localStorage.setItem('mywords_reviewCount', revVal);
                document.getElementById('reviewCountInput').value = revVal;
                const dictVal = document.getElementById('settingDictationCount').value;
                localStorage.setItem('mywords_dictationCount', dictVal);
                document.getElementById('dictationCountInput').value = dictVal;
                document.getElementById('settingsModal').style.display = 'none';
            }

            // 取词翻译逻辑
            const tooltip = document.getElementById('wordTooltip');
            let currentTooltipWord = null;

            function hideTooltip() {
                tooltip.style.display = 'none';
                currentTooltipWord = null;
            }

            async function showTooltip(word, x, y) {
                if (!word) return;
                const db = await openDB();
                const wd = await getWordResource(db, word);
                if (!wd) {
                    tooltip.innerHTML =
                        `<div class="tooltip-word">${word}</div><div class="tooltip-means">未找到释义</div>`;
                } else {
                    const means = wd.cnMean?.slice(0, 3).map(m => m.mean).join('; ') || '无释义';
                    tooltip.innerHTML = `
                        <div class="tooltip-word">${wd.word}</div>
                        <div class="tooltip-means">${means}</div>
                        <span class="detail-link" data-word="${wd.word}">查看详情</span>
                    `;
                    tooltip.querySelector('.detail-link')?.addEventListener('click', (e) => {
                        e.stopPropagation();
                        hideTooltip();
                        showWordDetailModal(wd);
                    });
                }
                tooltip.style.display = 'block';
                const rect = tooltip.getBoundingClientRect();
                let left = x + 10;
                let top = y + 10;
                if (left + 280 > window.innerWidth) left = x - 290;
                if (top + 150 > window.innerHeight) top = y - 160;
                tooltip.style.left = left + 'px';
                tooltip.style.top = top + 'px';
                currentTooltipWord = word;
            }

            function showWordDetailModal(wordData) {
                const modal = document.getElementById('wordDetailModal');
                document.getElementById('wordDetailInner').innerHTML = buildWordDetailsHTML(wordData);
                bindDetailButtons(document.getElementById('wordDetailInner'));
                modal.style.display = 'flex';
            }

            // 全局点击处理: 划词翻译 + 隐藏悬浮窗
            document.addEventListener('click', async (e) => {
                const wordSpan = e.target.closest('.word-clickable');
                if (wordSpan) {
                    e.preventDefault();
                    e.stopPropagation();
                    const word = wordSpan.dataset.word;
                    if (word) {
                        await showTooltip(word, e.clientX, e.clientY);
                    }
                    return;
                }
                // 点击悬浮窗内部或详情链接不隐藏
                if (e.target.closest('#wordTooltip') || e.target.closest('.detail-link')) {
                    return;
                }
                hideTooltip();
            });

            // 快捷键
            document.addEventListener('keydown', (e) => {
                if (currentView !== 'study') return;
                const active = document.activeElement;
                if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) return;
                const optionsArea = document.getElementById('optionsArea');
                const resultArea = document.getElementById('resultArea');
                if (optionsArea.style.display !== 'none' && currentMode !== 'dictation') {
                    const key = e.key.toLowerCase();
                    if (['z', 'x', 'c', 'v'].includes(key)) {
                        e.preventDefault();
                        const idx = { z: 0, x: 1, c: 2, v: 3 } [key];
                        const btns = document.querySelectorAll('.option-btn');
                        if (btns[idx] && !btns[idx].disabled) btns[idx].click();
                    }
                    if (key === 'f') {
                        e.preventDefault();
                        document.getElementById('favouriteBtn').click();
                    }
                } else if (resultArea.style.display !== 'none') {
                    if (e.key === ' ' || e.key === 'Enter') {
                        e.preventDefault();
                        document.getElementById('nextWordBtn').click();
                    }
                }
            });

            // 事件绑定
            document.getElementById('loadTextbookBtn').addEventListener('click', async () => {
                const book = document.getElementById('textbookSelect').value;
                if (!book) {
                    document.getElementById('statusMsg').innerHTML =
                        '<span style="color:orange;">请选择课本</span>';
                    return;
                }
                currentTextbookName = book;
                document.getElementById('statusMsg').textContent = '正在加载...';
                try {
                    await loadTextbookWordsFromFile(book);
                    document.getElementById('statusMsg').innerHTML =
                        `<span style="color:green;">已加载 "${book}"</span>`;
                    await startMode('learn');
                } catch (err) {
                    document.getElementById('statusMsg').innerHTML = '<span style="color:red;">加载失败</span>';
                }
            });

document.getElementById('modeLearnBtn').addEventListener('click', () => {
    if (currentView === 'study') switchView('home');
    currentMode = 'learn';
    updateModeButtons();
});

document.getElementById('modeReviewBtn').addEventListener('click', () => {
    if (currentView === 'study') switchView('home');
    currentMode = 'review';
    updateModeButtons();
});

document.getElementById('modeDictationBtn').addEventListener('click', () => {
    if (currentView === 'study') switchView('home');
    currentMode = 'dictation';
    updateModeButtons();
});
            document.getElementById('startReviewBtn').addEventListener('click', () => startMode('review'));
            document.getElementById('startDictationBtn').addEventListener('click', () => startMode('dictation'));
            document.getElementById('backHomeBtn').addEventListener('click', () => switchView('home'));
            document.getElementById('nextWordBtn').addEventListener('click', goNextWord);
            document.getElementById('playAudioBtn').addEventListener('click', () => {
                if (currentWordList[currentIndex]) playWordAudio(currentWordList[currentIndex]);
            });
            document.getElementById('enableAudio').addEventListener('change', e => audioEnabled = e.target.checked);
            document.getElementById('dictationSubmitBtn').addEventListener('click', handleDictationSubmit);
            document.getElementById('dictationInput').addEventListener('keydown', e => { if (e.key === 'Enter')
                    handleDictationSubmit(); });
            document.getElementById('settingsBtn').addEventListener('click', () => document.getElementById(
                'settingsModal').style.display = 'flex');
            document.getElementById('closeSettingsBtn').addEventListener('click', () => document.getElementById(
                'settingsModal').style.display = 'none');
            document.getElementById('saveSettingsBtn').addEventListener('click', saveSettings);
            document.getElementById('favouriteBtn').addEventListener('click', toggleFavourite);

            // 历史导航按钮
            document.getElementById('prevHistoryBtn').addEventListener('click', () => {
                if (historyViewIndex > 0) {
                    historyViewIndex--;
                    showHistoryResult(historyViewIndex);
                }
            });
            document.getElementById('nextHistoryBtn').addEventListener('click', () => {
                if (historyViewIndex < historyList.length - 1) {
                    historyViewIndex++;
                    showHistoryResult(historyViewIndex);
                }
            });

            // 单词详情模态框关闭
            document.getElementById('closeWordDetailModal').addEventListener('click', () => {
                document.getElementById('wordDetailModal').style.display = 'none';
            });
            document.getElementById('wordDetailModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('wordDetailModal')) {
                    document.getElementById('wordDetailModal').style.display = 'none';
                }
            });

            window.addEventListener('DOMContentLoaded', async () => {
 document.getElementById('restartBtn').addEventListener('click', () => {
    startMode(currentMode);
});
                initTextbookDropdowns();
                loadSettings();
                if (localStorage.ON_MyWords_Bank != "1") { await importWordsBank(); }
                switchView('home');
                updateModeButtons();
            });
        })();
        if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/MyWords/sw.js', { scope: '/MyWords/' })
      .then(registration => {
        console.log('[SW] 注册成功作用域:', registration.scope);
        registration.addEventListener('updatefound', () => {
          const newWorker = registration.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              console.log('[SW] 有新内容可用刷新页面');
            }
          });
        });
      })
      .catch(err => {
        console.log('[SW] 注册失败:', err);
      });
  });
}
